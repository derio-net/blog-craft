name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.157.0'
          extended: true
      - name: Install python deps + tools
        run: |
          python3 -m pip install --quiet pyyaml pillow pytest
          sudo apt-get update -qq && sudo apt-get install -y -qq pngquant optipng
      - name: Unit + reproduction tests
        run: PYTHON=python3 BLOG_CRAFT_TEST_VENV=/tmp/bcv bash tests/run-unit.sh tests/unit tests/reproduction
      - name: Smoke tests
        run: |
          for s in bootstrap media papers update character-sheet; do
            PYTHON=python3 BLOG_CRAFT_TEST_VENV=/tmp/bcv bash "tests/smoke-$s.sh"
          done
          BLOG_CRAFT_TEST_MODE=1 PYTHON=python3 bash tests/smoke-blog-post.sh
