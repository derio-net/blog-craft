name: Auto-tag on version change

# When a push to `main` changes the canonical version in `pyproject.toml`,
# create the matching `vX.Y.Z` git tag and a GitHub Release with auto-generated
# notes. Idempotent: if the tag already exists, the job is a no-op, so manual
# retries and force-pushes don't fail.
#
# The version is bumped via `tools/bump_version.py <patch|minor|major>` in a
# regular PR (CI enforces the bump); this workflow closes the loop once that PR
# merges. Ported from derio-net/super-fr (#18).

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml

permissions:
  contents: write

concurrency:
  group: auto-tag
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read canonical version
        id: ver
        run: |
          v="$(grep -E '^version[[:space:]]*=' pyproject.toml | head -1 | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')"
          if [ -z "$v" ]; then
            echo "could not parse version from pyproject.toml" >&2
            exit 1
          fi
          echo "tag=v${v}" >> "$GITHUB_OUTPUT"
          echo "Canonical version: ${v}"

      - name: Skip if tag already exists
        id: check
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists — nothing to do."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create annotated tag
        if: steps.check.outputs.exists == 'false'
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub Release with auto-generated notes
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: gh release create "${TAG}" --title "${TAG}" --generate-notes --target main
