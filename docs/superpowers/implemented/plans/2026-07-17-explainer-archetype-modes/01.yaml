    text: |
      [REFACTOR — optional] If the CLI body-split duplicates parse_frontmatter, extract a small split_frontmatter_body(text)->(fm_text, body) helper used by both; else leave as-is. Stay green. Skip if nothing to clean.
  - id: P1.T2.S2
