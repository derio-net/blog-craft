      Write failing `tests/unit/test_explainers_validators.py` (mirrors the paper-frontmatter half of `test_papers_validators.py`, no dossier-gate tests):
      - a `_fm(**over)` helper building a valid explainer frontmatter dict (`title, date, draft, weight, series=["explainers"], post_number, archetype, tldr`).
      - `test_explainer_passes` ‚Äî `validate_post(_fm(), weight_offset=1) == []`.
      - `test_explainer_weight_invariant_violation` ‚Äî wrong `weight` ‚Üí a "weight invariant" failure.
      - `test_explainer_weight_offset_is_config_driven` ‚Äî same shape as papers' offset-0-vs-1 test.
      - `test_explainer_missing_field` ‚Äî deleting `tldr` ‚Üí a failure naming it.
      - `test_explainer_series_mismatch` ‚Äî `series` not containing the explainers key ‚Üí a failure.

      Run `pytest tests/unit/test_explainers_validators.py -q` ‚Üí fails (module doesn't exist / stub only).
  - id: P1.T3.S2
    text: |-
      Implement `tools/validate_explainers.py`, mirroring `tools/validate_papers.py`'s structure (own `parse_frontmatter`, `_series_contains`, `validate_post(fm, weight_offset=1, explainers_key="explainers") -> list[str]`, and a `--config`-driven CLI `_main`). `REQUIRED_FIELDS = ["title", "date", "draft", "weight", "series", "post_number", "archetype", "tldr"]`. Weight invariant: `weight == post_number + weight_offset`. No dossier concept at all.

      Copy byte-identical over the stub at `templates/content-type-explainers/shared/scripts/validate_explainers.py`. Add the pair to `test_mirrors.py`'s `MIRRORS`:
      ```python
      ("tools/validate_explainers.py", "templates/content-type-explainers/shared/scripts/validate_explainers.py"),
      ```
      Re-run `pytest tests/unit/test_explainers_validators.py tests/unit/test_scaffold_explainer.py tests/unit/test_mirrors.py tests/unit/test_explainers_gating.py -q` ‚Üí all green (confirms scaffold output now also passes the real validator, not just the stub).
- number: 4
