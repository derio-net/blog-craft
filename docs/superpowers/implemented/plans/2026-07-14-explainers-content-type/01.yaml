      Run `pytest tests/unit/test_explainers_gating.py -q` ‚Üí fails (no `templates/content-type-explainers/` dir, no gating block yet).
  - id: P1.T1.S2
    text: |-
      Create `templates/content-type-explainers/shared/scripts/scaffold-explainer.sh` and `.../validate_explainers.py` as minimal placeholders (`#!/usr/bin/env bash\necho "not yet implemented" >&2; exit 1` and a matching one-line Python stub) ‚Äî just enough to exist and be copyable; real logic lands in Tasks 2‚Äì3.

      Add the explainers gating block to `tools/bootstrap-render.sh` immediately after the existing papers block (after line ~58, before the read-tracker block):
      ```bash
      # Opt-in content type: explainers shared assets (scaffold + validate scripts),
      # gated on content_types.explainers.enabled. The per-post bundle comes from
      # scaffold-explainer.sh, not bootstrap.
      explainers_value=$(cd "$RENDERER_DIR" && go run . --answers "$ANSWERS" --get-bool content_types.explainers.enabled 2>/dev/null || echo "false")
      if [[ "$explainers_value" == "true" ]]; then
        echo "[3b2] content-type-explainers: shared/"
        ( cd "$RENDERER_DIR" && go run . --src "$PLUGIN_ROOT/templates/content-type-explainers/shared" --dst "$TARGET" --answers "$ANSWERS" )
      else
        echo "[3b2] content-type-explainers: SKIPPED (content_types.explainers.enabled != true)"
      fi
      ```
      Re-run `pytest tests/unit/test_explainers_gating.py -q` ‚Üí green.
- number: 2
  title: scaffold-explainer.sh (TDD)
  steps:
  - id: P1.T2.S1
    text: |-
      Write failing `tests/unit/test_scaffold_explainer.py` (mirrors `test_scaffold_paper.py`, no dossier):
      - `test_scaffold_explainer` ‚Äî scaffolding post `7` slug `my-feature` against a temp `.blog-craft.yaml` (explainers config) writes `content/docs/explainers/07-my-feature/index.md`; parse its frontmatter and assert `post_number == 7`, `weight == 8` (7 + weight_offset 1), `series == ["explainers"]`, `archetype == "feature-deep-dive"` (default), and the body contains all six section headings: `## Overview`, `## Why it exists`, `## How it works`, `## Code walkthrough`, `## Tradeoffs & alternatives`, `## Try it yourself`.
      - `test_scaffold_refuses_duplicate` ‚Äî scaffolding the same `NN`/`slug` twice ‚Üí second call exits non-zero.

      Run `pytest tests/unit/test_scaffold_explainer.py -q` ‚Üí fails (script is still the S1 stub).
  - id: P1.T2.S2
    text: |-
      Implement `tools/scaffold-explainer.sh`, adapted from `tools/scaffold-paper.sh`: reads `weight_offset` and the explainers series key from `content_types.explainers` / `series[].content_type==explainers` (same config-parsing shape as `scaffold-paper.sh`'s Python heredoc, minus dossier fields). No dossier directory is created. Frontmatter written: `title` (TODO placeholder), `date`, `draft: true`, `weight`, `series: [<key>]`, `post_number`, `archetype` (arg, default `feature-deep-dive`), `tldr` (TODO), `tags: ["TODO"]`. Body: the six-section skeleton with a one-line budget/prompt comment under each heading (e.g. "*200‚Äì350 words. What the feature does and why it exists.*" under Overview).

      Copy the finished script byte-identical over the Task-1 stub at `templates/content-type-explainers/shared/scripts/scaffold-explainer.sh`. Add the pair to `tests/unit/test_mirrors.py`'s `MIRRORS` list:
      ```python
      ("tools/scaffold-explainer.sh", "templates/content-type-explainers/shared/scripts/scaffold-explainer.sh"),
      ```
      Re-run `pytest tests/unit/test_scaffold_explainer.py tests/unit/test_mirrors.py -q` ‚Üí green.
