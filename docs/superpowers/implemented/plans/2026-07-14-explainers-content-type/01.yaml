  steps:
  - id: P1.T4.S1
    text: |-
      Write `tests/unit/test_explainers_hugo.py` (lighter than `test_papers_hugo.py` ‚Äî no cross-link partials to exercise, just confirms the content-type is buildable): bootstrap a blog with `answers-explainers-v2.yaml`; scaffold post `1`/`smoke-test` via `tools/scaffold-explainer.sh`; append a ` ```mermaid\ngraph TD; A-->B; ``` ` fence under `## How it works`; set `draft: false`; run `hugo --buildDrafts` in the blog dir; assert `returncode == 0` and `public/explainers/01-smoke-test/index.html` exists and contains a mermaid-rendered marker (Hextra emits a `<pre class="mermaid">` or `mermaid` class on the code block ‚Äî run the build once first to inspect the actual generated HTML, then assert on whatever Hextra v0.12.1 emits).

      Run `pytest tests/unit/test_explainers_hugo.py -q`. This should pass on the first run given Tasks 1‚Äì3 are already green (nothing new to implement ‚Äî Hextra handles the `docs/explainers/` content section and Mermaid rendering natively); if it doesn't, fix whatever surfaces (e.g. a missing `content/docs/explainers/_index.md` from `per-series-always`, which should already render automatically for any configured series) until green.
