    text: |
      [RED] Extend the validate_config tests (tests/unit/test_validate_config.py or create): accepts version 4; site_dir optional string (rejects absolute paths); layer `_select` must be a list whose items are strings or lists of strings; image.character_sheet.layers optional list of strings. Run: bash tests/run-unit.sh -k validate_config
      EXPECT: new cases RED.
  - id: P3.T2.S2
    text: |
      [GREEN] Implement in tools/validate_config.py. Re-run -k validate_config.
      EXPECT: green.
- number: 3
  title: Verify (phase 3)
  steps:
  - id: P3.T3.S1
    text: |
      [VERIFY] bash tests/run-unit.sh; python tools/migrate_config.py --check on the gondor-shaped v2 fixture EXPECTS the full 002->003->004 ladder listed.
