  title: migrations/003_to_004.py, test-first
  steps:
  - id: P3.T1.S1
    text: |
      [RED] Add tests/unit/test_migration_004.py:
        1. metaphor block -> image.layers: base_style/persona/visual_constants/reference_guidance become same-named layers; metaphor.reference_image -> image.reference_image; composition_order (when absent) set to [base_style, persona, visual_constants, scene, reference_guidance]; metaphor block removed;
        2. image_gen.* merges into image.* (existing image.* keys win), block removed;
        3. a dict layer named `torso` without _select gains `_select: [[torso, series], torso_variant]`; one WITH _select is untouched; a scalar layer named torso untouched;
        4. version 3 -> 4; running on version != 3 raises ValueError; idempotent via the version gate;
        5. PARITY: take a metaphor-style config, migrate, compose a sample entry via compose() -> equals the old skill's hand-concatenation (base_style, persona, visual_constants bullets, scene, reference_guidance, blank-line separated).
      Run: bash tests/run-unit.sh -k migration_004
      EXPECT: RED (module absent).
  - id: P3.T1.S2
    text: |
      [GREEN] Write migrations/003_to_004.py in the exact shape of migrations/002_to_003.py (FROM_VERSION=3, TO_VERSION=4, pure migrate(cfg)->dict). Confirm tools/migrate_config.py discovers it by filename convention (NNN_to_MMM.py — check its loader; no registration file expected).
      Run: bash tests/run-unit.sh -k migration_004
      EXPECT: green.
