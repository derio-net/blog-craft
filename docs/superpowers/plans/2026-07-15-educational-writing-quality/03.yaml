    text: |-
      Extend `tests/unit/test_css_split.py` (red): `test_default_mermaid_theme_is_global` — a render with no papers/features still contains `.content .mermaid` and the default node fill `#1f3a5f`, and NO `.paper-post`; `test_global_mermaid_palette_override_without_papers` — with `features.css.mermaid_palette` set (no papers), the "GLOBAL config palette override" block and its four colours are present and `.paper-post` absent. Run → fails.
  - id: P3.T1.S2
    text: |-
      In `templates/hugo-hextra/assets/css/custom.css.tmpl`, add an always-present `.content .mermaid` theme block (nodes/labels/edges/arrowheads/dashed/edge-labels/clusters/title, dark default + light overrides, `!important`) in the structural section, plus a GLOBAL `features.css.mermaid_palette` override (`.content .mermaid …`, `!important`, so it wins everywhere incl. Papers). Leave the papers `.paper-post` surface gated as-is. Run the tests → green; existing `test_css_split.py` cases stay green.
- number: 2
