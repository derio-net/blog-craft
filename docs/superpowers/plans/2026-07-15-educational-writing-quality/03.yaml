      In `tools/render_explainer.py`: stash ```mermaid fences BEFORE `markdown()` (codehilite wraps them in highlight spans so a post-hoc regex never matches) and re-insert as `<pre class="mermaid">`; add `_mermaid_init(is_dark)` producing `mermaid.initialize({theme:'base', themeVariables:{…}})` with a light/dark palette matching the page, threaded through `render()`→`_wrap()`. Run → green.
