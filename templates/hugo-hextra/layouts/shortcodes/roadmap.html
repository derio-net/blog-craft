<!--
  Data-driven roadmap shortcode. Renders from data/roadmap.yaml:

    layers:
      - {name: "1. Hardware", desc: "Physical machines, networking, power"}
      - {name: "N. Future thing", desc: "Not done yet", upcoming: true}

  Keeping the roadmap in data/ (a content path) means blog-specific entries
  live with the blog, not baked into this shipped template.
-->
<style>
.roadmap { --rm-bg: #f8f9fa; --rm-border: #dee2e6; --rm-text: #212529; --rm-muted: #6c757d; --rm-accent: #0d6efd; font-family: inherit; max-width: 720px; margin: 1.5rem auto; }
.dark .roadmap { --rm-bg: #1a1a2e; --rm-border: #333; --rm-text: #e0e0e0; --rm-muted: #999; --rm-accent: #4dabf7; }
.roadmap-layer { border-left: 4px solid var(--rm-accent); background: var(--rm-bg); color: var(--rm-text); padding: 0.75rem 1rem; margin-bottom: 0.5rem; border-radius: 0 4px 4px 0; }
.roadmap-layer .layer-name { font-weight: 600; }
.roadmap-layer .layer-desc { color: var(--rm-muted); font-size: 0.9rem; }
.layer-upcoming { border-left-style: dashed; opacity: 0.55; }
</style>

<div class="roadmap">
{{- with .Site.Data.roadmap }}
  {{- range .layers }}
  <div class="roadmap-layer{{ if .upcoming }} layer-upcoming{{ end }}">
    <div class="layer-name">{{ .name }}</div>
    {{- with .desc }}<div class="layer-desc">{{ . }}</div>{{ end }}
  </div>
  {{- end }}
{{- else }}
  <em>Add roadmap entries to <code>data/roadmap.yaml</code> (a <code>layers:</code> list of <code>{name, desc, upcoming?}</code>).</em>
{{- end }}
</div>
